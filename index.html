<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Transcribe — A/01</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #f0eeea;
    color: #111;
    min-height: 100vh;
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 0 60px;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px;
    border-bottom: 1px solid #c8c5bf;
  }
  .top-label { font-size: 11px; font-weight: 500; letter-spacing: .12em; color: #888; }
  .top-status { font-size: 11px; font-weight: 500; letter-spacing: .1em; color: #888; }

  .hero { padding: 28px 24px 0; }
  .hero-title {
    font-size: clamp(52px, 10vw, 80px);
    font-weight: 800;
    line-height: .92;
    color: #111;
    letter-spacing: -.03em;
  }
  .hero-title .accent { color: #c94b1e; }

  .divider { height: 1px; background: #c8c5bf; margin: 22px 24px 0; }

  .key-row { display: flex; margin: 0 24px; border-bottom: 1px solid #c8c5bf; }
  .key-field { flex: 1; padding: 12px 0; }
  .key-field:first-child { border-right: 1px solid #c8c5bf; padding-right: 14px; }
  .key-field:last-child { padding-left: 14px; }
  .field-label { font-size: 10px; font-weight: 600; letter-spacing: .12em; color: #999; margin-bottom: 6px; }
  .key-input {
    width: 100%; background: transparent; border: none; outline: none;
    font-size: 13px; font-family: 'Courier New', monospace; color: #111;
  }
  .key-input::placeholder { color: #ccc; }
  .select-bare {
    background: transparent; border: none; outline: none;
    font-size: 13px; color: #111; cursor: pointer; padding: 0; width: 100%;
    font-family: inherit;
  }

  .drop-area {
    margin: 0 24px;
    border: 1px solid #c8c5bf;
    border-top: none;
    padding: 32px 24px;
    text-align: center;
    cursor: pointer;
    transition: background .15s;
    user-select: none;
  }
  .drop-area:hover, .drop-area.over { background: #e8e5df; }
  .drop-area.has-file { background: #e8e5df; }

  .drop-big {
    font-size: clamp(28px, 5vw, 40px);
    font-weight: 800;
    color: #111;
    letter-spacing: -.02em;
    line-height: 1;
    margin-bottom: 8px;
  }
  .drop-sub { font-size: 11px; letter-spacing: .08em; color: #999; }

  .waveform-wrap {
    margin: 0 24px;
    border: 1px solid #c8c5bf;
    border-top: none;
    height: 76px;
    display: flex;
    align-items: center;
    padding: 0 18px;
    overflow: hidden;
  }
  .waveform-bars { display: flex; align-items: center; gap: 2px; width: 100%; height: 100%; }
  .bar { flex: 1; background: #111; border-radius: 1px; height: 8%; transition: height .2s ease; }

  .meta-strip { display: flex; margin: 0 24px; border: 1px solid #c8c5bf; border-top: none; }
  .meta-cell { flex: 1; padding: 10px 16px; border-right: 1px solid #c8c5bf; }
  .meta-cell:last-child { border-right: none; }
  .meta-label { font-size: 10px; letter-spacing: .1em; color: #999; font-weight: 600; margin-bottom: 4px; }
  .meta-val { font-size: 20px; font-weight: 800; color: #111; line-height: 1.1; letter-spacing: -.01em; }

  /* --- КНОПКИ --- */
  .action-row { display: flex; margin: 0 24px; border: 1px solid #c8c5bf; border-top: none; }

  #goBtn {
    flex: 2;
    padding: 18px 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .1em;
    border: none;
    outline: none;
    font-family: inherit;
    cursor: default;
    /* ДИЗЕЙБЛ: серый фон, серый текст — чётко читается */
    background: #d8d5cf;
    color: #a8a5a0;
    border-right: 1px solid #c8c5bf;
    transition: background .15s, color .15s;
  }
  #goBtn.active {
    background: #c94b1e;
    color: #ffffff;
    cursor: pointer;
    border-right: 1px solid #a83c16;
  }
  #goBtn.active:hover { background: #b03f18; }
  #goBtn.active:active { background: #952f10; }

  #resetBtn {
    flex: 1;
    padding: 18px 16px;
    border: none;
    outline: none;
    font-size: 11px;
    letter-spacing: .08em;
    font-family: inherit;
    cursor: default;
    /* ДИЗЕЙБЛ */
    background: #d8d5cf;
    color: #b8b5b0;
    transition: background .15s, color .15s;
  }
  #resetBtn.ready {
    background: #e8e5df;
    color: #555;
    cursor: pointer;
  }
  #resetBtn.ready:hover { background: #d0cdc7; color: #111; }
  #resetBtn.ready:active { background: #c0bdb7; }

  /* --- ПРОГРЕСС --- */
  .progress-row {
    margin: 0 24px;
    border: 1px solid #c8c5bf;
    border-top: none;
    padding: 14px 18px;
    display: none;
  }
  .prog-track { height: 2px; background: #d0cec8; margin-bottom: 8px; }
  .prog-fill { height: 100%; width: 0%; background: #c94b1e; transition: width .3s; }
  .prog-label { font-size: 11px; letter-spacing: .08em; color: #888; }
  .chunk-info { font-size: 11px; letter-spacing: .06em; color: #c94b1e; margin-top: 4px; }

  /* --- ОШИБКА --- */
  .err-strip {
    margin: 0 24px;
    border: 1px solid #c94b1e;
    border-top: none;
    background: #fdf0eb;
    padding: 10px 18px;
    font-size: 12px;
    color: #c94b1e;
    letter-spacing: .04em;
    display: none;
  }

  /* --- РЕЗУЛЬТАТ --- */
  .result-wrap { margin: 0 24px; border: 1px solid #c8c5bf; border-top: none; display: none; }
  .result-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 18px; border-bottom: 1px solid #c8c5bf;
  }
  .result-tag { font-size: 10px; font-weight: 600; letter-spacing: .12em; color: #888; }
  .btn-copy {
    font-size: 11px; letter-spacing: .08em;
    background: transparent; border: 1px solid #c8c5bf;
    padding: 4px 12px; cursor: pointer; color: #111;
    font-family: inherit; transition: background .12s;
  }
  .btn-copy:hover { background: #e8e5df; }
  .result-body {
    padding: 18px; font-size: 14px; line-height: 1.8; color: #111;
    white-space: pre-wrap; min-height: 80px;
  }

  /* --- ФУТЕР --- */
  .bottom-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 24px; border-top: 1px solid #c8c5bf; margin: 0 24px;
  }
  .bottom-label { font-size: 10px; letter-spacing: .1em; color: #bbb; }
</style>
</head>
<body>
<div class="wrap">

  <div class="top-bar">
    <span class="top-label">ТРАНСКРИБАТОР — A/01</span>
    <span class="top-status" id="topStatus">ОЖИДАНИЕ</span>
  </div>

  <div class="hero">
    <div class="hero-title">TRANS<span class="accent">–</span><br>CRIBE</div>
  </div>
  <div class="divider"></div>

  <div class="key-row">
    <div class="key-field">
      <div class="field-label">API KEY</div>
      <input class="key-input" type="password" id="apiKey" placeholder="sk-..." oninput="updateBtn()"/>
    </div>
    <div class="key-field">
      <div class="field-label">ЯЗЫК / LANG</div>
      <select class="select-bare" id="lang">
        <option value="ru">RU — Русский</option>
        <option value="en">EN — English</option>
        <option value="">AUTO</option>
        <option value="uk">UK — Українська</option>
        <option value="de">DE — Deutsch</option>
        <option value="fr">FR — Français</option>
        <option value="es">ES — Español</option>
        <option value="zh">ZH — 中文</option>
      </select>
    </div>
  </div>

  <div class="drop-area" id="dropArea"
    onclick="document.getElementById('fi').click()"
    ondragover="ev(event,1)" ondragleave="ev(event,0)" ondrop="dr(event)">
    <div class="drop-big" id="dropBig">ЗАГРУЗИТЬ ФАЙЛ</div>
    <div class="drop-sub" id="dropSub">MP3 · MP4 · WAV · M4A · OGG · WEBM · любой размер</div>
  </div>
  <input type="file" id="fi" accept="audio/*,video/*" style="display:none" onchange="setF(this.files[0])">

  <div class="waveform-wrap">
    <div class="waveform-bars" id="waveBars"></div>
  </div>

  <div class="meta-strip">
    <div class="meta-cell">
      <div class="meta-label">РАЗМЕР</div>
      <div class="meta-val" id="metaSize">—</div>
    </div>
    <div class="meta-cell">
      <div class="meta-label">ЧАНКИ</div>
      <div class="meta-val" id="metaChunks">—</div>
    </div>
    <div class="meta-cell">
      <div class="meta-label">СТАТУС</div>
      <div class="meta-val" id="metaStatus">—</div>
    </div>
  </div>

  <div class="action-row">
    <button id="goBtn" onclick="go()">ТРАНСКРИБИРОВАТЬ →</button>
    <button id="resetBtn" onclick="reset()">СБРОС</button>
  </div>

  <div class="progress-row" id="progRow">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-label" id="progLabel">ПОДГОТОВКА</div>
    <div class="chunk-info" id="chunkInfo"></div>
  </div>

  <div class="err-strip" id="errStrip"></div>

  <div class="result-wrap" id="resultWrap">
    <div class="result-header">
      <span class="result-tag">РЕЗУЛЬТАТ</span>
      <button class="btn-copy" onclick="cp()">КОПИРОВАТЬ</button>
    </div>
    <div class="result-body" id="resultBody"></div>
  </div>

  <div class="bottom-bar">
    <span class="bottom-label">WHISPER-1 · OPENAI</span>
    <span class="bottom-label" id="wordCount"></span>
  </div>

</div>

<script>
const CHUNK = 24 * 1024 * 1024;
let file = null, waveTimer = null;

(function buildWave() {
  const c = document.getElementById('waveBars');
  for (let i = 0; i < 64; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    c.appendChild(b);
  }
})();

function animWave(on) {
  clearInterval(waveTimer);
  const bars = document.querySelectorAll('.bar');
  if (!on) { bars.forEach(b => b.style.height = '8%'); return; }
  waveTimer = setInterval(() => {
    bars.forEach(b => { b.style.height = (Math.random() * 72 + 8) + '%'; });
  }, 110);
}

function ev(e, on) { e.preventDefault(); document.getElementById('dropArea').classList.toggle('over', !!on); }
function dr(e) { e.preventDefault(); document.getElementById('dropArea').classList.remove('over'); if (e.dataTransfer.files[0]) setF(e.dataTransfer.files[0]); }

function setF(f) {
  if (!f) return;
  file = f;
  const mb = (f.size / 1024 / 1024).toFixed(1);
  const chunks = Math.ceil(f.size / CHUNK);
  document.getElementById('dropBig').textContent = f.name.length > 24 ? f.name.slice(0, 22) + '…' : f.name;
  document.getElementById('dropSub').textContent = '';
  document.getElementById('dropArea').classList.add('has-file');
  document.getElementById('metaSize').textContent = mb + ' МБ';
  document.getElementById('metaChunks').textContent = chunks > 1 ? chunks + ' ЧСТ' : '1 ЧСТ';
  document.getElementById('metaStatus').textContent = 'ГОТОВ';
  document.getElementById('topStatus').textContent = 'ФАЙЛ ЗАГРУЖЕН';
  animWave(true);
  updateBtn();
}

function updateBtn() {
  const k = document.getElementById('apiKey').value.trim();
  const ready = !!(file && k.startsWith('sk-'));
  const go = document.getElementById('goBtn');
  const rst = document.getElementById('resetBtn');
  if (ready) { go.classList.add('active'); } else { go.classList.remove('active'); }
  if (file) { rst.classList.add('ready'); } else { rst.classList.remove('ready'); }
}

function showErr(msg) { const e = document.getElementById('errStrip'); e.textContent = 'ERR · ' + msg; e.style.display = 'block'; }
function hideErr() { document.getElementById('errStrip').style.display = 'none'; }

async function transcribeChunk(blob, key, lang, idx) {
  const form = new FormData();
  form.append('file', new File([blob], 'chunk' + idx + '.mp3', { type: blob.type || 'audio/mpeg' }));
  form.append('model', 'whisper-1');
  form.append('response_format', 'text');
  if (lang) form.append('language', lang);
  const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + key },
    body: form
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'Ошибка ' + res.status); }
  return await res.text();
}

async function go() {
  const k = document.getElementById('apiKey').value.trim();
  if (!file || !k.startsWith('sk-')) return;
  hideErr();
  document.getElementById('goBtn').classList.remove('active');
  document.getElementById('resultWrap').style.display = 'none';
  document.getElementById('wordCount').textContent = '';
  document.getElementById('progRow').style.display = 'block';
  document.getElementById('topStatus').textContent = 'ОБРАБОТКА';
  animWave(true);

  const lang = document.getElementById('lang').value;
  const total = Math.ceil(file.size / CHUNK);
  const results = [];

  try {
    for (let i = 0; i < total; i++) {
      const blob = file.slice(i * CHUNK, (i + 1) * CHUNK);
      document.getElementById('progFill').style.width = Math.round((i / total) * 90) + '%';
      document.getElementById('progLabel').textContent = total > 1 ? 'НАРЕЗКА И ОТПРАВКА' : 'WHISPER ОБРАБАТЫВАЕТ';
      document.getElementById('chunkInfo').textContent = total > 1 ? 'ЧАСТЬ ' + (i + 1) + ' ИЗ ' + total : '';
      document.getElementById('metaStatus').textContent = (i + 1) + '/' + total;
      results.push((await transcribeChunk(blob, k, lang, i)).trim());
    }
    document.getElementById('progFill').style.width = '100%';
    document.getElementById('progLabel').textContent = 'ГОТОВО';
    document.getElementById('chunkInfo').textContent = '';
    const full = results.join(' ');
    document.getElementById('resultBody').textContent = full;
    document.getElementById('resultWrap').style.display = 'block';
    const words = full.split(/\s+/).filter(Boolean).length;
    document.getElementById('wordCount').textContent = words + ' СЛ · ' + full.length + ' СИМ';
    document.getElementById('topStatus').textContent = 'ГОТОВО';
    document.getElementById('metaStatus').textContent = 'DONE';
    animWave(false);
  } catch (e) {
    document.getElementById('progRow').style.display = 'none';
    showErr(e.message);
    document.getElementById('topStatus').textContent = 'ОШИБКА';
    document.getElementById('metaStatus').textContent = 'ERR';
    animWave(false);
  } finally {
    updateBtn();
  }
}

function cp() {
  navigator.clipboard.writeText(document.getElementById('resultBody').textContent).then(() => {
    const b = document.querySelector('.btn-copy');
    b.textContent = 'СКОПИРОВАНО';
    setTimeout(() => b.textContent = 'КОПИРОВАТЬ', 1500);
  });
}

function reset() {
  if (!file) return;
  file = null;
  clearInterval(waveTimer);
  animWave(false);
  document.getElementById('dropBig').textContent = 'ЗАГРУЗИТЬ ФАЙЛ';
  document.getElementById('dropSub').textContent = 'MP3 · MP4 · WAV · M4A · OGG · WEBM · любой размер';
  document.getElementById('dropArea').classList.remove('has-file', 'over');
  document.getElementById('metaSize').textContent = '—';
  document.getElementById('metaChunks').textContent = '—';
  document.getElementById('metaStatus').textContent = '—';
  document.getElementById('topStatus').textContent = 'ОЖИДАНИЕ';
  document.getElementById('progRow').style.display = 'none';
  document.getElementById('resultWrap').style.display = 'none';
  document.getElementById('wordCount').textContent = '';
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('fi').value = '';
  hideErr();
  updateBtn();
}
</script>
</body>
</html>
